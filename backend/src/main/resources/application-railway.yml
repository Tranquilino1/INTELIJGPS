spring:
  datasource:
    # Railway injects DATABASE_URL as postgresql://user:pass@host:port/db
    # We convert it to JDBC format by setting each part from the PG* variables
    url: jdbc:postgresql://${PGHOST}:${PGPORT:5432}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql
    baseline-on-migrate: true

  # Disable Kafka & Redis to run on Railway's minimal setup
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Kafka is disabled, fallback directly to memory
intelijgps:
  kafka:
    topics:
      traffic-malabo: traffic.malabo

# Expose actuator health endpoint for Railway healthcheck
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
