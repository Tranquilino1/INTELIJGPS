spring:
  datasource:
    # Railway provides the full connection string dynamically in either DATABASE_URL or PGURL
    url: ${DATABASE_PUBLIC_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/intelijgps}}
    username: ${PGUSER:postgres}
    password: ${PGPASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration/postgresql
    baseline-on-migrate: true

  # Disable Kafka & Redis to run on Railway's minimal setup easily
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration

# Kafka is disabled, fallback directly to memory
intelijgps:
  kafka:
    topics:
      traffic-malabo: traffic.malabo
