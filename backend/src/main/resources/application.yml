spring:
  application:
    name: intelijgps-backend

  # ── DataSource (Default: PostgreSQL) ──────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/intelijgps}
    username: ${SPRING_DATASOURCE_USERNAME:intelijgps_user}
    password: ${SPRING_DATASOURCE_PASSWORD:intelijgps_secret}
    driver-class-name: org.postgresql.Driver

  # ── JPA / Hibernate ─────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  # ── Flyway ──────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration/${DATABASE_TYPE:postgresql}
    baseline-on-migrate: true

  # ── Redis ───────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  # ── Kafka ───────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: intelijgps-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: com.intelijgps.*
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # ── Static Resources (Frontend) ─────────────────────────────────────────
  web:
    resources:
      static-locations: classpath:/static/

# ── Server ──────────────────────────────────────────────────────────────────
server:
  port: 8080

# ── INTELIJGPS Custom Config ────────────────────────────────────────────────
intelijgps:
  jwt:
    secret: ${JWT_SECRET:intelijgps-dev-secret-key-minimum-256-bits-long-enough}
    expiration-ms: 86400000   # 24 hours
  navigation:
    default-search-radius-m: 300
    voice-instruction-distance-m: 150
  kafka:
    topics:
      traffic-malabo: traffic.malabo
      traffic-bata: traffic.bata
      reports-nationwide: reports.nationwide

# ── Swagger / OpenAPI ────────────────────────────────────────────────────────
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    operationsSorter: method

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    com.intelijgps: DEBUG
    org.springframework.web.socket: INFO

---
# ── H2 Profile Overrides ─────────────────────────────────────────────────────
spring:
  config:
    activate:
      on-profile: h2
  datasource:
    url: jdbc:h2:mem:intelijgps;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: validate
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    locations: classpath:db/migration/h2
  
  # Disable Kafka/Redis for local H2 mode
  autoconfigure:
    exclude: 
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.kafka.KafkaAutoConfiguration
